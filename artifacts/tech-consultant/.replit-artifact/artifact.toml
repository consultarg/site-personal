kind = "web"
previewPath = "/"
title = "Tech Consultant Portfolio"
version = "1.0.0"
id = "artifacts/tech-consultant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21514

[services.development]
run = "pnpm --filter @workspace/tech-consultant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tech-consultant", "run", "build" ]
publicDir = "artifacts/tech-consultant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21514"
BASE_PATH = "/"
